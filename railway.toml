[build]
builder = "nixpacks"
buildCommand = "npm run build"

[build.nixpacksPlan.variables]
NIXPACKS_NODE_VERSION = "22"

[deploy]
startCommand = "node ./dist/server/entry.mjs"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "web"
